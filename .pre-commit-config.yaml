minimum_pre_commit_version: 4.3.0
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        additional_dependencies: [setuptools]
        name: isort (python)

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length=120]

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--strict]
        pass_filenames: false
        additional_dependencies: [dacite]

  - repo: local
    hooks:
      - id: qmlformat
        name: Format QML files
        entry: bash -c 'for file in "$@"; do qmlformat -i "$file" && rm -f "${file}~"; done' --
        language: system
        files: \.qml$
        pass_filenames: true

      - id: qml-contract-coverage
        name: Check QML contract coverage
        entry: uv run python tests/tools/check_qml_contract_coverage.py
        language: system
        pass_filenames: false
        always_run: true

      - id: daemon-rpc-boundary
        name: Check daemon RPC boundary
        entry: uv run python tests/tools/check_daemon_rpc_boundary.py
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: Run pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
