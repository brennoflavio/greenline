name: Release Greenline
enable-email-notifications: true

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Required format vX.Y.Z or vX.Y.Z-rcN (for example v1.0.0 or v1.0.0-rc1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: clickable-ut24-1x-arm64

    steps:
      - name: Install Node.js for JavaScript actions
        run: |
          set -eu
          case "$(uname -m)" in
            x86_64) NODE_ARCH=x64 ;;
            aarch64) NODE_ARCH=arm64 ;;
            *)
              echo "Unsupported architecture: $(uname -m)"
              exit 1
              ;;
          esac
          NODE_VERSION=v20.19.2
          NODE_FILENAME="node-$NODE_VERSION-linux-$NODE_ARCH.tar.gz"
          NODE_DIR="$HOME/.local/node-$NODE_VERSION"
          curl -fsSL "https://nodejs.org/dist/$NODE_VERSION/$NODE_FILENAME" -o "/tmp/$NODE_FILENAME"
          curl -fsSL "https://nodejs.org/dist/$NODE_VERSION/SHASUMS256.txt" -o /tmp/SHASUMS256.txt
          cd /tmp
          grep " $NODE_FILENAME$" SHASUMS256.txt | sha256sum -c -
          mkdir -p "$NODE_DIR"
          tar -xzf "/tmp/$NODE_FILENAME" -C "$NODE_DIR" --strip-components=1
          echo "$NODE_DIR/bin" >> "$GITHUB_PATH"

      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release metadata
        id: release
        run: |
          set -eu
          tag='${{ github.event.inputs.tag }}'
          version="${tag#v}"
          version="${version/-rc/~rc}"

          case "$tag" in
            *-rc*) prerelease=true ;;
            *) prerelease=false ;;
          esac

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        run: |
          set -eu
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: uv run pytest

      - name: Verify runner tooling
        run: |
          set -eu
          node --version
          uv --version
          clickable --version

      - name: Build
        env:
          GREENLINE_BUILD_VERSION: ${{ steps.release.outputs.version }}
          GITHUB_SHA: ${{ steps.release.outputs.sha }}
        run: clickable build --arch arm64

      - name: Stage release assets
        run: |
          set -eu
          mkdir -p dist/release
          cp build/aarch64-linux-gnu/app/*.click dist/release/

      - name: Create release tag
        env:
          FORGEJO_SERVER: ${{ github.server_url }}
          FORGEJO_REPOSITORY: ${{ github.repository }}
          FORGEJO_TOKEN: ${{ forge.token }}
        run: |
          set -eu
          tag='${{ steps.release.outputs.tag }}'
          sha='${{ steps.release.outputs.sha }}'

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag '$tag' already exists on origin" >&2
            exit 1
          fi

          git config user.name 'forgejo-actions'
          git config user.email 'contato@brennoflavio.com.br'
          git remote set-url origin "https://oauth2:${FORGEJO_TOKEN}@${FORGEJO_SERVER#https://}/${FORGEJO_REPOSITORY}.git"
          git tag -a "$tag" -m "Release $tag" "$sha"
          git push origin "refs/tags/$tag"

      - name: Create release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.12.1
        with:
          direction: upload
          token: ${{ forge.token }}
          tag: ${{ steps.release.outputs.tag }}
          title: Greenline ${{ steps.release.outputs.tag }}
          prerelease: ${{ steps.release.outputs.prerelease }}
          override: true
          release-dir: dist/release

concurrency:
  group: release-greenline
  cancel-in-progress: false
